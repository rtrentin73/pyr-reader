<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyr Reader</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-row">
                    <svg class="mascot-icon" viewBox="0 0 100 100" width="32" height="32" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="46" fill="#A8BFE6" stroke="#fff" stroke-width="3"/>
                        <ellipse cx="30" cy="40" rx="8" ry="12" fill="#F0ECE6" stroke="#3D4D65" stroke-width="1.5" transform="rotate(-10 30 40)"/>
                        <ellipse cx="70" cy="40" rx="8" ry="12" fill="#F0ECE6" stroke="#3D4D65" stroke-width="1.5" transform="rotate(10 70 40)"/>
                        <ellipse cx="50" cy="48" rx="22" ry="20" fill="#F5F2ED" stroke="#3D4D65" stroke-width="1.8"/>
                        <ellipse cx="50" cy="32" rx="16" ry="8" fill="#F5F2ED" stroke="#3D4D65" stroke-width="1.5"/>
                        <ellipse cx="50" cy="56" rx="12" ry="10" fill="#fff" stroke="#3D4D65" stroke-width="1.2"/>
                        <circle cx="41" cy="46" r="3" fill="#2C3E50"/>
                        <circle cx="59" cy="46" r="3" fill="#2C3E50"/>
                        <circle cx="42" cy="45" r="1" fill="#fff"/>
                        <circle cx="60" cy="45" r="1" fill="#fff"/>
                        <ellipse cx="50" cy="54" rx="3.5" ry="2.5" fill="#2C3E50"/>
                        <path d="M47 57 Q50 61 53 57" stroke="#2C3E50" stroke-width="1" fill="none" stroke-linecap="round"/>
                        <ellipse cx="50" cy="60.5" rx="2" ry="2.5" fill="#E8787A"/>
                    </svg>
                    <h1 class="logo">Pyr Reader</h1>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <h2 class="nav-section-title">BOARDS</h2>
                    <button class="nav-action-btn" id="new-board-btn">
                        <span class="nav-action-icon">+</span> New Board
                    </button>
                    <ul class="nav-list" id="boards-list">
                        <!-- Boards populated dynamically -->
                    </ul>
                </div>

                <div class="nav-section">
                    <h2 class="nav-section-title">FEEDS</h2>
                    <ul class="nav-list">
                        <li>
                            <button class="nav-item" data-view="all-posts">
                                <span class="nav-icon">&#9783;</span> All Posts
                            </button>
                        </li>
                        <li>
                            <button class="nav-item" data-view="rss-feeds">
                                <span class="nav-icon">&#9881;</span> RSS Feeds
                            </button>
                        </li>
                        <li>
                            <button class="nav-item" data-view="x-twitter">
                                <span class="nav-icon">&#120143;</span> X / Twitter
                            </button>
                        </li>
                        <li>
                            <button class="nav-item" data-view="linkedin">
                                <span class="nav-icon">in</span> LinkedIn
                            </button>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <h2 class="nav-section-title">SETTINGS</h2>
                    <ul class="nav-list">
                        <li>
                            <button class="nav-item" data-view="classifier">
                                <span class="nav-icon">&#9881;</span> Classifier
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content" id="main-content">
            <!-- Content rendered dynamically by JS -->
        </main>

        <!-- Post Detail Modal -->
        <div class="modal-overlay" id="modal-overlay" hidden>
            <div class="modal" id="modal">
                <button class="modal-close" id="modal-close">&times;</button>
                <div class="modal-body" id="modal-body">
                    <!-- Modal content populated dynamically -->
                </div>
            </div>
        </div>

        <!-- Toast Container -->
        <div class="toast-container" id="toast-container"></div>

        <!-- New Board Dialog -->
        <div class="modal-overlay" id="new-board-overlay" hidden>
            <div class="modal modal-small">
                <button class="modal-close" id="new-board-close">&times;</button>
                <div class="modal-body">
                    <h2 class="modal-title">New Board</h2>
                    <form id="new-board-form">
                        <div class="form-group">
                            <label for="board-name-input">Name</label>
                            <input type="text" id="board-name-input" placeholder="Board name" required>
                        </div>
                        <div class="form-group">
                            <label for="board-desc-input">Description</label>
                            <textarea id="board-desc-input" placeholder="Optional description" rows="3"></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" id="new-board-cancel">Cancel</button>
                            <button type="submit" class="btn btn-primary">Create Board</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Add to Board Dialog -->
        <div class="modal-overlay" id="add-to-board-overlay" hidden>
            <div class="modal modal-small">
                <button class="modal-close" id="add-to-board-close">&times;</button>
                <div class="modal-body">
                    <h2 class="modal-title">Add to Board</h2>
                    <div id="add-to-board-content">
                        <!-- Populated dynamically -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
